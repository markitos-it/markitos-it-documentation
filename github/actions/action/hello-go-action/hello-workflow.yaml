name: Ejemplo de Uso
on: [push]

jobs:
  saludar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v5

      - name: Instalar Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false


      - name: Ejecutar saludo personalizado
        uses: ./.github/actions/hello-go-action
        with:
          nombre: "Markitos"